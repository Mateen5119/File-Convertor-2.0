name: Web CI

on:
  push:
    paths:
      - 'web/**'
      - '.github/workflows/web-ci.yml'
  pull_request:
    paths:
      - 'web/**'
      - '.github/workflows/web-ci.yml'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'web/package-lock.json'
          
      - name: Install dependencies
        working-directory: ./web
        run: npm ci
        
      - name: Lint
        working-directory: ./web
        run: npm run lint
        
      - name: Build
        working-directory: ./web
        run: npm run build
        
      - name: Setup Python for API tests
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install ruff
        run: pip install ruff
        
      - name: Ruff Check API
        working-directory: ./web
        run: ruff check api/
